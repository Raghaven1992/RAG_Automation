services:
  chatbot:
    build: .
    ports: ["8501:8501", "8000:8000"] # 8501: UI, 8000: Metrics
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - PDF_DATA_PATH=/app/data
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db

  prometheus:
    image: prom/prometheus
    volumes:
      - ${WORKSPACE}/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"

  grafana:
    image: grafana/grafana
    ports: ["3001:3000"]
